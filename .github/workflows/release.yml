name: Release

on:
  push:
    tags:
      - 'v*'
      - 'sdk/go/agentmsg/v*'
  workflow_dispatch:

env:
  GO_VERSION: '1.21'
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  release:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python release tooling
        run: |
          python3 -m pip install build wheel

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: sdk/nodejs/package-lock.json

      - name: Install Node.js SDK dependencies
        run: |
          cd sdk/nodejs
          npm ci

      - name: Verify tag matches VERSION
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          expected_tag="v$(cat VERSION)"
          expected_go_tag="sdk/go/agentmsg/v$(cat VERSION)"
          actual_tag="${GITHUB_REF#refs/tags/}"
          if [ "$expected_tag" != "$actual_tag" ] && [ "$expected_go_tag" != "$actual_tag" ]; then
            echo "tag/version mismatch: expected $expected_tag or $expected_go_tag but got $actual_tag" >&2
            exit 1
          fi

      - name: Build release artifacts
        run: |
          chmod +x ./scripts/check-release-artifacts.sh ./scripts/build-python-sdk.sh ./scripts/build-release-artifacts.sh
          ./scripts/build-release-artifacts.sh ./dist/release

      - name: Generate release notes
        run: |
          python3 ./scripts/generate-release-notes.py > ./dist/release-notes.md

      - name: Generate checksums
        run: |
          shasum -a 256 dist/release/* > ./dist/release/SHA256SUMS

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-artifacts
          path: |
            dist/release/*
            dist/release-notes.md
          retention-days: 30

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/*
          body_path: dist/release-notes.md

  publish-node:
    name: Publish Node SDK
    runs-on: ubuntu-latest
    needs: [release]
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          name: release-artifacts
          path: dist/release

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: Publish package to npm
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "Skipping npm publish because NPM_TOKEN is not configured."
            exit 0
          fi
          npm publish dist/release/agentmsg-sdk-*.tgz --access public

  publish-python:
    name: Publish Python SDK
    runs-on: ubuntu-latest
    needs: [release]
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      TWINE_USERNAME: __token__
      TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          name: release-artifacts
          path: dist/release

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install publish tooling
        run: |
          python3 -m pip install twine

      - name: Validate Python distribution metadata
        run: |
          python3 -m twine check dist/release/agentmsg-*.tar.gz dist/release/agentmsg-*.whl

      - name: Publish package to PyPI
        run: |
          if [ -z "$TWINE_PASSWORD" ]; then
            echo "Skipping PyPI publish because PYPI_API_TOKEN is not configured."
            exit 0
          fi
          python3 -m twine upload --non-interactive dist/release/agentmsg-*.tar.gz dist/release/agentmsg-*.whl
