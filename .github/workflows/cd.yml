name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

env:
  DOCKER_IMAGE: agentmsg

jobs:
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull latest images
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/agentmsg-api-gateway:latest
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/agentmsg-message-engine:latest

      - name: Deploy to Kubernetes
        run: |
          kubectl config use-context ${{ secrets.KUBECONFIG_CONTEXT }}
          kubectl apply -f deployments/k8s/ -n agentmsg
          kubectl rollout status deployment/api-gateway -n agentmsg
          kubectl rollout status deployment/message-engine -n agentmsg
