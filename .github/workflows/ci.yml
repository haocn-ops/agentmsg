name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

env:
  GO_VERSION: '1.21'
  GO_LINT_VERSION: '1.23'
  GOLANGCI_LINT_VERSION: '1.64.8'
  CODECOV_CLI_VERSION: '11.2.8'
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'
  DOCKER_IMAGE: agentmsg

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_LINT_VERSION }}
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python release tooling
        run: |
          python3 -m pip install build wheel

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: sdk/nodejs/package-lock.json

      - name: Install Python SDK dependencies
        run: |
          python3 -m pip install -r sdk/python/requirements.txt

      - name: Install Node.js SDK dependencies
        run: |
          cd sdk/nodejs
          npm ci

      - name: Run golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v${{ env.GOLANGCI_LINT_VERSION }}
          golangci-lint run ./...

  test:
    name: Verify
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: agentmsg
          POSTGRES_PASSWORD: agentmsg
          POSTGRES_DB: agentmsg_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python release tooling
        run: |
          python3 -m pip install build wheel

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: sdk/nodejs/package-lock.json

      - name: Install Node.js SDK dependencies
        run: |
          cd sdk/nodejs
          npm ci

      - name: Install Python SDK dependencies
        run: |
          python3 -m pip install -r sdk/python/requirements.txt

      - name: Run verification suite
        env:
          DATABASE_URL: postgres://agentmsg:agentmsg@127.0.0.1:5432/agentmsg_test?sslmode=disable
          REDIS_URL: redis://127.0.0.1:6379/0
        run: |
          chmod +x ./scripts/verify.sh ./scripts/smoke.sh
          VERIFY_MANAGE_DOCKER=false \
          VERIFY_GO_TEST_FLAGS="-v -race -coverprofile=coverage.out" \
          make verify

      - name: Upload coverage
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        continue-on-error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          curl -Os "https://cli.codecov.io/v${CODECOV_CLI_VERSION}/linux/codecov"
          chmod +x codecov
          if [ -n "${CODECOV_TOKEN}" ]; then
            ./codecov --verbose upload-process --disable-search -t "${CODECOV_TOKEN}" -n "verify-${GITHUB_RUN_ID}" -f coverage.out
          else
            ./codecov --verbose upload-process --disable-search -n "verify-${GITHUB_RUN_ID}" -f coverage.out
          fi

  release-check:
    name: Release Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python release tooling
        run: |
          python3 -m pip install build

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: sdk/nodejs/package-lock.json

      - name: Install Node.js SDK dependencies
        run: |
          cd sdk/nodejs
          npm ci

      - name: Verify release artifacts
        run: |
          chmod +x ./scripts/build-python-sdk.sh
          make release-check
          chmod +x ./scripts/check-version-tooling.sh ./scripts/update-changelog.sh
          ./scripts/check-version-tooling.sh
          python3 ./scripts/generate-release-notes.py > /tmp/agentmsg-release-notes.md

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test, release-check]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build API Gateway
        run: |
          go build -o build/api-gateway ./cmd/api-gateway

      - name: Build Message Engine
        run: |
          go build -o build/message-engine ./cmd/message-engine

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: binaries
          path: |
            build/api-gateway
            build/message-engine
          retention-days: 7

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Check Docker Hub configuration
        id: dockerhub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.dockerhub.outputs.enabled == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.dockerhub.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Skip Docker publish
        if: steps.dockerhub.outputs.enabled != 'true'
        run: echo "Skipping Docker publish because Docker Hub secrets are not configured."

      - name: Build and push API Gateway
        if: steps.dockerhub.outputs.enabled == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./
          file: ./deployments/docker/Dockerfile.api-gateway
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/agentmsg-api-gateway:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/agentmsg-api-gateway:${{ github.sha }}

      - name: Build and push Message Engine
        if: steps.dockerhub.outputs.enabled == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./
          file: ./deployments/docker/Dockerfile.message-engine
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/agentmsg-message-engine:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/agentmsg-message-engine:${{ github.sha }}

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    environment: staging
    env:
      STAGING_KUBECONFIG: ${{ secrets.STAGING_KUBECONFIG }}
      STAGING_KUBECONFIG_CONTEXT: ${{ secrets.STAGING_KUBECONFIG_CONTEXT }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          if [ -z "$STAGING_KUBECONFIG" ]; then
            echo "Skipping staging deploy because STAGING_KUBECONFIG is not configured."
            exit 0
          fi
          printf '%s' "$STAGING_KUBECONFIG" > "$RUNNER_TEMP/kubeconfig"
          chmod 600 "$RUNNER_TEMP/kubeconfig"
          echo "KUBECONFIG=$RUNNER_TEMP/kubeconfig" >> "$GITHUB_ENV"
          if [ -n "$STAGING_KUBECONFIG_CONTEXT" ]; then
            kubectl config use-context "$STAGING_KUBECONFIG_CONTEXT"
          fi

      - name: Render staging manifests
        run: |
          if [ -z "$STAGING_KUBECONFIG" ]; then
            exit 0
          fi
          chmod +x ./scripts/render-k8s-manifests.sh
          ./scripts/render-k8s-manifests.sh \
            deployments/k8s/overlays/staging \
            "${{ secrets.DOCKERHUB_USERNAME }}/agentmsg-api-gateway:${{ github.sha }}" \
            "${{ secrets.DOCKERHUB_USERNAME }}/agentmsg-message-engine:${{ github.sha }}" \
            > "$RUNNER_TEMP/agentmsg-staging.yaml"

      - name: Apply staging manifests
        run: |
          if [ -z "$STAGING_KUBECONFIG" ]; then
            exit 0
          fi
          kubectl apply -f "$RUNNER_TEMP/agentmsg-staging.yaml"
          kubectl rollout status deployment/api-gateway -n agentmsg-staging
          kubectl rollout status deployment/message-engine -n agentmsg-staging
