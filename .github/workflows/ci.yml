name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

env:
  GO_VERSION: '1.21'
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'
  DOCKER_IMAGE: agentmsg

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python release tooling
        run: |
          python3 -m pip install build

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: sdk/nodejs/package-lock.json

      - name: Install Python SDK dependencies
        run: |
          python3 -m pip install -r sdk/python/requirements.txt

      - name: Install Node.js SDK dependencies
        run: |
          cd sdk/nodejs
          npm ci

      - name: Run golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          golangci-lint run ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: agentmsg
          POSTGRES_PASSWORD: agentmsg
          POSTGRES_DB: agentmsg_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: sdk/nodejs/package-lock.json

      - name: Install Node.js SDK dependencies
        run: |
          cd sdk/nodejs
          npm ci

      - name: Run tests
        env:
          DATABASE_URL: postgres://agentmsg:agentmsg@localhost:5432/agentmsg_test?sslmode=disable
          REDIS_URL: redis://localhost:6379/0
        run: |
          go test -v -race -coverprofile=coverage.out ./...

      - name: Run Go SDK tests
        run: |
          cd sdk/go/agentmsg
          go test ./...

      - name: Run Python SDK tests
        run: |
          PYTHONPATH=sdk/python python3 -m unittest discover -s sdk/python/tests

      - name: Run Node.js SDK tests
        run: |
          cd sdk/nodejs
          npm test

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: coverage.out
          fail_ci_if_error: false

  release-check:
    name: Release Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: sdk/nodejs/package-lock.json

      - name: Install Node.js SDK dependencies
        run: |
          cd sdk/nodejs
          npm ci

      - name: Verify release artifacts
        run: |
          chmod +x ./scripts/build-python-sdk.sh
          make release-check
          chmod +x ./scripts/check-version-tooling.sh ./scripts/generate-release-notes.sh
          ./scripts/check-version-tooling.sh
          ./scripts/generate-release-notes.sh > /tmp/agentmsg-release-notes.md

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test, release-check]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build API Gateway
        run: |
          go build -o build/api-gateway ./cmd/api-gateway

      - name: Build Message Engine
        run: |
          go build -o build/message-engine ./cmd/message-engine

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            build/api-gateway
            build/message-engine
          retention-days: 7

  smoke:
    name: Smoke
    runs-on: ubuntu-latest
    needs: [build]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: agentmsg
          POSTGRES_PASSWORD: agentmsg
          POSTGRES_DB: agentmsg_smoke
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run startup smoke checks
        env:
          DATABASE_URL: postgres://agentmsg:agentmsg@localhost:5432/agentmsg_smoke?sslmode=disable
          REDIS_URL: redis://localhost:6379/0
        run: |
          chmod +x ./scripts/smoke.sh
          ./scripts/smoke.sh

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [smoke]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./
          file: ./deployments/docker/Dockerfile.api-gateway
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/agentmsg-api-gateway:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/agentmsg-api-gateway:${{ github.sha }}

      - name: Build and push Message Engine
        uses: docker/build-push-action@v5
        with:
          context: ./
          file: ./deployments/docker/Dockerfile.message-engine
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/agentmsg-message-engine:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/agentmsg-message-engine:${{ github.sha }}

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        if: ${{ secrets.STAGING_KUBECONFIG != '' }}
        env:
          STAGING_KUBECONFIG: ${{ secrets.STAGING_KUBECONFIG }}
          STAGING_KUBECONFIG_CONTEXT: ${{ secrets.STAGING_KUBECONFIG_CONTEXT }}
        run: |
          printf '%s' "$STAGING_KUBECONFIG" > "$RUNNER_TEMP/kubeconfig"
          chmod 600 "$RUNNER_TEMP/kubeconfig"
          echo "KUBECONFIG=$RUNNER_TEMP/kubeconfig" >> "$GITHUB_ENV"
          if [ -n "$STAGING_KUBECONFIG_CONTEXT" ]; then
            kubectl config use-context "$STAGING_KUBECONFIG_CONTEXT"
          fi

      - name: Render staging manifests
        if: ${{ secrets.STAGING_KUBECONFIG != '' }}
        run: |
          chmod +x ./scripts/render-k8s-manifests.sh
          ./scripts/render-k8s-manifests.sh \
            deployments/k8s/overlays/staging \
            "${{ secrets.DOCKERHUB_USERNAME }}/agentmsg-api-gateway:${{ github.sha }}" \
            "${{ secrets.DOCKERHUB_USERNAME }}/agentmsg-message-engine:${{ github.sha }}" \
            > "$RUNNER_TEMP/agentmsg-staging.yaml"

      - name: Apply staging manifests
        if: ${{ secrets.STAGING_KUBECONFIG != '' }}
        run: |
          kubectl apply -f "$RUNNER_TEMP/agentmsg-staging.yaml"
          kubectl rollout status deployment/api-gateway -n agentmsg-staging
          kubectl rollout status deployment/message-engine -n agentmsg-staging

      - name: Skip staging deploy when kubeconfig is not configured
        if: ${{ secrets.STAGING_KUBECONFIG == '' }}
        run: echo "Skipping staging deploy because STAGING_KUBECONFIG is not configured."
