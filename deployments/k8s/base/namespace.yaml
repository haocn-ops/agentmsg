apiVersion: v1
kind: Namespace
metadata:
  name: agentmsg
  labels:
    name: agentmsg
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: agentmsg-config
  namespace: agentmsg
data:
  API_GATEWAY_PORT: "8080"
  MESSAGE_ENGINE_PORT: "8081"
  LOG_LEVEL: "info"
  ENV: "production"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
  OTEL_INSECURE: "false"
  RATE_LIMIT_REQUESTS: "1000"
  RATE_LIMIT_WINDOW_SECONDS: "60"
---
apiVersion: v1
kind: Secret
metadata:
  name: agentmsg-secrets
  namespace: agentmsg
type: Opaque
stringData:
  JWT_SECRET: "CHANGE_ME_IN_PRODUCTION"
  DATABASE_URL: "postgres://agentmsg:PASSWORD@postgres:5432/agentmsg?sslmode=require"
  REDIS_URL: "redis://redis:6379/0"
