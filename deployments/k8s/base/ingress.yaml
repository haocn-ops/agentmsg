apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-gateway
  namespace: agentmsg
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: message-engine
  namespace: agentmsg
automountServiceAccountToken: false
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agentmsg-ingress
  namespace: agentmsg
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-write-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    - host: api.agentmsg.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080
  tls:
    - hosts:
        - api.agentmsg.example.com
      secretName: agentmsg-tls
