apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: agentmsg

patches:
  - target:
      kind: Namespace
      name: agentmsg
    patch: |-
      - op: add
        path: /metadata/labels/environment
        value: production
  - target:
      kind: ConfigMap
      name: agentmsg-config
    patch: |-
      - op: replace
        path: /data/ENV
        value: production
      - op: replace
        path: /data/LOG_LEVEL
        value: info
  - target:
      kind: Ingress
      name: agentmsg-ingress
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: api.agentmsg.example.com
      - op: replace
        path: /spec/tls/0/hosts/0
        value: api.agentmsg.example.com
      - op: replace
        path: /spec/tls/0/secretName
        value: agentmsg-tls
